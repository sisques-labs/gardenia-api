bugs_fixed:
  - id: jwt-global-guard
    description: >
      JwtAuthGuard as APP_GUARD blocked public routes (register, login).
      Fixed with OptionalJwtAuthGuard that uses Reflector to bypass JWT
      validation entirely for @SkipSpace routes.
  - id: tenant-delete-string-spread
    description: >
      Spreading a string UUID in the tenant proxy delete interceptor produced
      character-indexed keys ({ '0': 'a', ... }). Fixed by detecting string/number
      criteria and wrapping as { id: criteria, spaceId }.
