name: Release Train

on:
  push:
    branches: [develop, staging, main]

permissions:
  contents: write
  packages: write

# One group for the whole repo: develop/staging/main releases are serialized
# so two channels never compute versions from a half-updated tag state.
concurrency:
  group: release-train
  cancel-in-progress: false

jobs:
  release:
    uses: sisques-labs/workflows/.github/workflows/release-train.yml@main
    with:
      image_name: sisqueslabs/gardenia-api
      ghcr_image_name: ghcr.io/sisques-labs/gardenia-api
      push_ghcr: true
      node_version: "22"
      run_lint: true
      run_test: true
      platforms: linux/amd64,linux/arm64
      sync_develop_after_stable: true
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
    permissions:
      contents: write
      packages: write

  notify-e2e:
    name: Trigger e2e (${{ github.ref_name == 'develop' && 'alpha' || 'beta' }})
    needs: release
    if: github.ref_name == 'develop' || github.ref_name == 'staging'
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch gardenia-e2e run
        env:
          CHANNEL: ${{ github.ref_name == 'develop' && 'alpha' || 'beta' }}
          TOKEN: ${{ secrets.E2E_DISPATCH_TOKEN }}
        run: |
          curl -sf -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $TOKEN" \
            https://api.github.com/repos/sisques-labs/gardenia-e2e/dispatches \
            -d "{\"event_type\":\"${CHANNEL}-released\",\"client_payload\":{\"channel\":\"${CHANNEL}\",\"source\":\"${{ github.repository }}\",\"ref\":\"${{ github.sha }}\"}}"
