name: Release Train

on:
  push:
    branches: [develop, staging, main]

permissions:
  contents: write
  packages: write
  security-events: write

# One group for the whole repo: develop/staging/main releases are serialized
# so two channels never compute versions from a half-updated tag state.
concurrency:
  group: release-train
  cancel-in-progress: false

jobs:
  release:
    uses: sisques-labs/workflows/.github/workflows/release-train.yml@main
    with:
      image_name: sisqueslabs/gardenia-api
      ghcr_image_name: ghcr.io/sisques-labs/gardenia-api
      push_ghcr: true
      node_version: "22"
      run_lint: true
      run_test: true
      platforms: linux/amd64,linux/arm64
      sync_develop_after_stable: true
      sync_dependabot_updates_after_stable: true
      scan_image: true
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
    permissions:
      contents: write
      packages: write
      security-events: write

  deploy:
    name: Deploy to Coolify
    needs: release
    if: needs.release.outputs.should_release == 'true'
    uses: sisques-labs/workflows/.github/workflows/coolify-deploy.yml@main
    secrets:
      COOLIFY_BASE_URL: ${{ secrets.COOLIFY_BASE_URL }}
      COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
      COOLIFY_UUID: >-
        ${{
          github.ref_name == 'main' && secrets.COOLIFY_UUID_PROD ||
          github.ref_name == 'staging' && secrets.COOLIFY_UUID_STAGING ||
          secrets.COOLIFY_UUID_DEV
        }}
