name: Auto Promote

on:
  push:
    branches: [develop, staging]

permissions:
  contents: read
  pull-requests: write

jobs:
  promote:
    name: Open promotion PR
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Determine target branch
        id: target
        run: |
          if [ "${{ github.ref_name }}" = "develop" ]; then
            echo "base=staging" >> $GITHUB_OUTPUT
          else
            echo "base=main" >> $GITHUB_OUTPUT
          fi

      - name: Open PR if none exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BASE="${{ steps.target.outputs.base }}"
          HEAD="${{ github.ref_name }}"

          EXISTING=$(gh pr list \
            --base "$BASE" \
            --head "$HEAD" \
            --state open \
            --json number \
            --jq 'length')

          if [ "$EXISTING" -gt 0 ]; then
            echo "PR from $HEAD → $BASE already exists, skipping."
            exit 0
          fi

          gh pr create \
            --base "$BASE" \
            --head "$HEAD" \
            --title "chore: promote $HEAD → $BASE" \
            --body "Automated promotion PR from \`$HEAD\` to \`$BASE\`." \
            --label "type:chore"
